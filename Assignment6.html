<!DOCTYPE html>
<html lang="en">

<head>

  <title>Eli's Portfolio</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Keeps image from being cropped and allows scrolling if needed */
    .image-wrapper {
      width: 100%;
      overflow-x: auto;
      text-align: center;
      padding: 10px 0;
    }

    .portfolio-image {
      height: auto;
      width: auto;
      max-width: 100%;
      display: inline-block;
    }
  </style>
</head>

<body>

  <div class="container mt-4">

    <h1 class="text-center">Eli's Portfolio</h1>

    <!-- IMAGE SECTION -->
    <div class="image-wrapper">
      <img src="YOUR-IMAGE-FILENAME.png" class="portfolio-image" alt="Chart or Graphic">
    </div>

    <!-- TEXT BOXES -->
    <div class="row mt-4">
      <div class="col-md-6">
        <div class="card p-3">
          <h5>Box 1</h5>
          <p>Your text here...</p>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card p-3">
          <h5>Box 2</h5>
          <p>Your text here...</p>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
